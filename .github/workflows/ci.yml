name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - uses: pnpm/action-setup@v4


      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:web

      - name: Typecheck
        run: pnpm typecheck:web

      - name: Build
        run: pnpm --filter @gamesung/web build

  server:
    name: Server (build, vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: packages/server/go.sum

      - name: Build
        working-directory: packages/server
        run: go build ./...

      - name: Vet
        working-directory: packages/server
        run: go vet ./...
